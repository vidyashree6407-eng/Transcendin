<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <title>Premium Course Enrollment - TranscendIN</title>
    <link rel="icon" type="image/png" href="Logo%20with%20full%20name%20without%20background.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <style>
        /* Premium Interactive Enrollment Styles */
        :root {
            --primary-blue: #0052CC;
            --primary-orange: #FF6B35;
            --primary-white: #FFFFFF;
            --dark-text: #1a1a1a;
            --light-text: #666666;
            --light-bg: #f8f9fa;
            --border-color: #e0e0e0;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0, 82, 204, 0.1);
            --shadow-md: 0 8px 24px rgba(0, 82, 204, 0.15);
            --shadow-lg: 0 20px 48px rgba(0, 82, 204, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .navbar-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .navbar-logo img {
            display: block;
            height: auto;
            max-height: 48px;
            width: auto;
        }

        .navbar-logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-nav {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .navbar-nav a {
            color: var(--dark-text);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
            position: relative;
        }

        .navbar-nav a:hover {
            color: var(--primary-blue);
        }

        .navbar-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-orange));
            transition: width 0.3s ease;
        }

        .navbar-nav a:hover::after {
            width: 100%;
        }

        /* Main Container */
        .enrollment-container {
            margin-top: 70px;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Hero Section */
        .enrollment-hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }

        .enrollment-hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .enrollment-hero p {
            font-size: 1.2rem;
            color: var(--light-text);
            margin-bottom: 20px;
        }

        .course-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-blue);
        }

        .stat-item .label {
            font-size: 0.9rem;
            color: var(--light-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Course Catalog Section */
        .catalog-section {
            margin-bottom: 60px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .filter-control:hover {
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-sm);
        }

        .filter-control select {
            border: none;
            background: transparent;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        /* Course Grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
            cursor: pointer;
            animation: fadeInUp 0.6s ease backwards;
        }

        .course-card:nth-child(1) { animation-delay: 0.05s; }
        .course-card:nth-child(2) { animation-delay: 0.1s; }
        .course-card:nth-child(3) { animation-delay: 0.15s; }
        .course-card:nth-child(n+4) { animation-delay: 0.2s; }

        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .course-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .course-image::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: moveBackground 20s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .course-image i {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .course-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 107, 53, 0.95);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            backdrop-filter: blur(5px);
        }

        .course-content {
            padding: 25px;
        }

        .course-category {
            display: inline-block;
            background: var(--light-bg);
            color: var(--primary-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .course-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--dark-text);
            line-height: 1.3;
        }

        .course-description {
            font-size: 0.95rem;
            color: var(--light-text);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light-bg);
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--light-text);
        }

        .meta-item i {
            color: var(--primary-orange);
            font-size: 1.1rem;
        }

        .course-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--dark-text);
        }

        .course-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }

        .course-price small {
            font-size: 0.8rem;
            color: var(--light-text);
            display: block;
            margin-bottom: 5px;
        }

        .view-details-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-blue), #0041a0);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .view-details-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 82, 204, 0.3);
        }

        .view-details-btn:active {
            transform: scale(0.98);
        }

        /* Modal/Details Section */
        .course-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .course-details-modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 100px;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            max-width: 1000px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            color: white;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .modal-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .modal-header-content {
            position: relative;
            z-index: 1;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            background: rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: var(--transition-smooth);
        }

        .close-modal:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-header h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .modal-header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .modal-body {
            padding: 40px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .detail-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-section h3 i {
            font-size: 1.8rem;
        }

        .detail-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--light-text);
        }

        .detail-list {
            list-style: none;
        }

        .detail-list li {
            padding: 10px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .detail-list i {
            color: var(--primary-orange);
            margin-top: 3px;
            flex-shrink: 0;
        }

        .instructor-card {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .instructor-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            margin: 0 auto 15px;
        }

        .instructor-name {
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 5px;
        }

        .instructor-title {
            font-size: 0.9rem;
            color: var(--light-text);
            margin-bottom: 10px;
        }

        .instructor-info {
            font-size: 0.85rem;
            color: var(--light-text);
            line-height: 1.6;
        }

        /* Pricing Section */
        .pricing-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 40px;
            border-radius: 20px;
            margin-top: 40px;
        }

        .pricing-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .pricing-header h3 {
            font-size: 2rem;
            color: var(--dark-text);
            margin-bottom: 10px;
        }

        .pricing-header p {
            color: var(--light-text);
            font-size: 1.1rem;
        }

        .pricing-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .pricing-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            position: relative;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
        }

        .pricing-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-blue);
        }

        .pricing-card.best-value {
            border-color: var(--primary-orange);
            transform: scale(1.05);
        }

        .pricing-card.best-value:hover {
            transform: scale(1.05) translateY(-15px);
        }

        .best-value-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary-orange), #ff8c42);
            color: white;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .pricing-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 20px;
        }

        .pricing-original {
            font-size: 0.9rem;
            color: var(--light-text);
            margin-bottom: 8px;
            text-decoration: line-through;
        }

        .pricing-amount {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }

        .pricing-amount small {
            font-size: 0.9rem;
            display: block;
            color: var(--light-text);
        }

        .pricing-description {
            font-size: 0.95rem;
            color: var(--light-text);
            margin-bottom: 25px;
            padding: 15px 0;
            border-top: 2px solid var(--light-bg);
            border-bottom: 2px solid var(--light-bg);
        }

        .pricing-features {
            list-style: none;
            margin-bottom: 30px;
            text-align: left;
        }

        .pricing-features li {
            padding: 10px 0;
            display: flex;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--light-text);
        }

        .pricing-features i {
            color: var(--primary-orange);
            margin-top: 2px;
        }

        .pricing-actions {
            display: grid;
            gap: 12px;
        }

        .btn-enroll {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary-blue), #0041a0);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-enroll:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 82, 204, 0.3);
        }

        .btn-secondary {
            padding: 12px 20px;
            background: transparent;
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            background: var(--primary-blue);
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .navbar {
                padding: 0 20px;
            }

            .course-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .details-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .pricing-cards {
                grid-template-columns: 1fr;
            }

            .pricing-card.best-value {
                transform: scale(1);
            }

            .pricing-card.best-value:hover {
                transform: translateY(-15px);
            }
        }

        @media (max-width: 768px) {
            .navbar-nav {
                display: none;
            }

            .enrollment-hero h1 {
                font-size: 2.5rem;
            }

            .course-stats {
                gap: 20px;
            }

            .stat-item .number {
                font-size: 2rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .filter-group {
                width: 100%;
            }

            .filter-control {
                flex: 1;
                min-width: 150px;
            }

            .course-grid {
                grid-template-columns: 1fr;
            }

            .modal-body {
                padding: 20px;
            }

            .modal-header {
                padding: 25px;
            }

            .modal-header h2 {
                font-size: 1.8rem;
            }

            .pricing-section {
                padding: 20px;
            }

            .pricing-header h3 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 0 15px;
            }

            .navbar-logo {
                font-size: 1.4rem;
            }

            .enrollment-hero h1 {
                font-size: 1.8rem;
            }

            .course-stats {
                flex-direction: column;
                gap: 15px;
            }

            .filter-control {
                font-size: 0.9rem;
                padding: 8px 12px;
            }

            .modal-content {
                border-radius: 15px;
            }

            .modal-body {
                padding: 15px;
            }

            .pricing-amount {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <img src="assets/images/logo.png" alt="TranscendIN logo">
            </a>
            <ul class="navbar-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">All Courses</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="enrollment-container">
        <div class="container">
            <!-- Hero Section -->
            <section class="enrollment-hero">
                <h1>Transform Your Career</h1>
                <p>Enroll in world-class professional training courses</p>
            </section>

            <!-- Catalog Section -->
            <section class="catalog-section">
                <div class="section-header">
                    <h2>Available Courses</h2>
                    <div class="filter-group">
                        <select class="filter-control" id="courseFilter">
                            <option value="">All Courses</option>
                            <!-- Course names will be populated by JavaScript -->
                        </select>
                        <select class="filter-control" id="categoryFilter">
                            <option value="">All Categories</option>
                            <option value="technical">Technical</option>
                            <option value="business">Business</option>
                            <option value="professional">Professional</option>
                            <option value="azure">Azure</option>
                            <option value="leadership">Leadership</option>
                            <option value="customer-service">Customer Service</option>
                            <option value="sales">Sales</option>
                        </select>
                        <select class="filter-control" id="durationFilter">
                            <option value="">All Durations</option>
                            <option value="mini">Mini (0.5 days)</option>
                            <option value="1day">1 Day</option>
                            <option value="2day">2 Days</option>
                            <option value="3day">3 Days</option>
                            <option value="4day">4 Days</option>
                            <option value="5day">5 Days</option>
                            <option value="6day">6 Days</option>
                        </select>

        ];

        let filteredCourses = [...coursesDatabase];
        let selectedCourse = null;

        // Course Icons Mapping
        const categoryIcons = {
            'technical': 'fa-code',
            'business': 'fa-briefcase',
            'professional': 'fa-certificate',
            'azure': 'fa-cloud',
            'leadership': 'fa-crown',
            'customer-service': 'fa-headset',
            'sales': 'fa-chart-line'
        };

        function getDurationLabel(duration) {
            if (duration < 1) return 'Mini (0.5 day)';
            if (duration === 1) return '1 Day';
            if (duration === 2) return '2 Days';
            if (duration === 3) return '3 Days';
            if (duration === 4) return '4 Days';
            if (duration === 5) return '5 Days';
            return '6 Days';
        }

        function renderCourses() {
            const grid = document.getElementById('courseGrid');
            
            grid.innerHTML = filteredCourses.map((course, index) => `
                <div class="course-card" style="animation-delay: ${index * 0.05}s">
                    <div class="course-image">
                        <i class="fas ${categoryIcons[course.category] || 'fa-book'}"></i>
                        ${course.featured ? '<span class="course-badge">⭐ Featured</span>' : ''}
                    </div>
                    <div class="course-content">
                        <span class="course-category">${escapeHtml(course.category)}</span>
                        <h3 class="course-title">${escapeHtml(course.name)}</h3>
                        <p class="course-description">${escapeHtml(course.description)}</p>
                        <div class="course-meta">
                            <div class="meta-item">
                                <i class="fas fa-star"></i>
                                <span class="course-rating">${course.rating} (${course.reviews})</span>
                            </div>
                        </div>
                        <button class="view-details-btn" onclick="openCourseDetails(${course.id})">
                            View Details
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openCourseDetails(courseId) {
            selectedCourse = coursesDatabase.find(c => c.id === courseId);
            if (!selectedCourse) return;

            // Populate modal header
            document.getElementById('modalTitle').textContent = selectedCourse.name;
            document.getElementById('modalDescription').textContent = selectedCourse.description;

            // Populate course details
            document.getElementById('modalDuration').textContent = getDurationLabel(selectedCourse.duration);
            document.getElementById('modalCategory').textContent = selectedCourse.category.charAt(0).toUpperCase() + selectedCourse.category.slice(1);
            document.getElementById('modalRating').textContent = `${selectedCourse.rating} ★ (${selectedCourse.reviews} reviews)`;

            // Course overview (safely insert text)
            const modalOverview = document.getElementById('modalOverview');
            modalOverview.textContent = '';
            const p1 = document.createElement('p');
            p1.textContent = selectedCourse.description || '';
            const p2 = document.createElement('p');
            p2.style.marginTop = '15px';
            p2.style.fontSize = '0.95rem';
            p2.textContent = `This comprehensive course is designed for professionals looking to advance their skills in ${selectedCourse.category}. Join hundreds of satisfied students who have already transformed their careers with this program.`;
            modalOverview.appendChild(p1);
            modalOverview.appendChild(p2);

            // Learning outcomes (static, but insert safely)
            const outcomesList = ['Master core concepts', 'Practical hands-on experience', 'Industry-recognized certification', 'Career advancement opportunities', 'Networking with industry experts'];
            const modalOutcomes = document.getElementById('modalOutcomes');
            modalOutcomes.textContent = '';
            outcomesList.forEach(outcome => {
                const li = document.createElement('li');
                const icon = document.createElement('i');
                icon.className = 'fas fa-check-circle';
                li.appendChild(icon);
                li.appendChild(document.createTextNode(' ' + outcome));
                modalOutcomes.appendChild(li);
            });

            // Show modal
            document.getElementById('courseModal').classList.add('active');
        }

        function closeCourseModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        function populateCourseDropdown() {
            const courseFilter = document.getElementById('courseFilter');
            coursesDatabase.forEach(course => {
                const option = document.createElement('option');
                option.value = course.id;
                option.textContent = course.name;
                courseFilter.appendChild(option);
            });
        }

        function applyFilters() {
            const courseId = document.getElementById('courseFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const duration = document.getElementById('durationFilter').value;

            filteredCourses = coursesDatabase.filter(course => {
                const matchCourse = !courseId || course.id === parseInt(courseId);
                const matchCategory = !category || course.category === category;
                const matchDuration = !duration || (
                    (duration === 'mini' && course.duration < 1) ||
                    (duration === '1day' && course.duration === 1) ||
                    (duration === '2day' && course.duration === 2) ||
                    (duration === '3day' && course.duration === 3) ||
                    (duration === '4day' && course.duration === 4) ||
                    (duration === '5day' && course.duration === 5) ||
                    (duration === '6day' && course.duration === 6)
                );
                return matchCourse && matchCategory && matchDuration;
            });

            renderCourses();
        }

        // Event Listeners
        populateCourseDropdown();
        document.getElementById('courseFilter').addEventListener('change', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('durationFilter').addEventListener('change', applyFilters);
        document.getElementById('closeModal').addEventListener('click', closeCourseModal);

        document.getElementById('courseModal').addEventListener('click', (e) => {
            if (e.target.id === 'courseModal') {
                closeCourseModal();
            }
        });

        // Initial render
        renderCourses();
    </script>
